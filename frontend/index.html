<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> <!-- 🔥 FIXES WEIRD ICON ISSUE -->
  <title>AI Resume Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>AI Resume Analyzer</h1>

    <label>Upload Resumes (max 5)</label>
    <input type="file" id="resumeInput" multiple accept=".pdf,.doc,.docx,.txt" />
    <small>Select multiple OR upload one by one</small>

    <div id="fileList"></div>

    <label>Upload Job Description</label>
    <input type="file" id="jd" />

    <button class="primary-btn" onclick="analyze()">Analyze</button>

    <h2>Results</h2>
    <div id="output">Waiting for input...</div>
  </div>

  <script src="script.js"></script>

</body>
</html>
